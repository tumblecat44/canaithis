name: Production smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check homepage
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko)
          echo "/ko → $code"
          test "$code" = "200"

      - name: Check login page
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/login)
          echo "/ko/login → $code"
          test "$code" = "200"

      - name: Check RSS feed
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/feed.xml)
          echo "/feed.xml → $code"
          test "$code" = "200"
          curl -sL https://canaithis.vercel.app/feed.xml | head -1 | grep -q "<?xml"

      - name: Check challenge edit redirects to login
        run: |
          challenge_id=$(
            curl -sL https://canaithis.vercel.app/feed.xml \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from feed.xml → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/edit")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/challenges/${challenge_id}/edit → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check solution new redirects to login
        run: |
          challenge_id=$(
            curl -sL https://canaithis.vercel.app/feed.xml \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from feed.xml → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/solutions/new")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/challenges/${challenge_id}/solutions/new → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check solution edit redirects to login
        run: |
          home_html=$(curl -sL https://canaithis.vercel.app/ko)
          solution_id=$(
            echo "$home_html" \
              | grep -oE 'ACTION_ID_[a-f0-9]{24}' \
              | head -1 \
              | sed 's|ACTION_ID_||'
          )
          test -n "$solution_id"
          echo "solution id from /ko → $solution_id"
          edit_found=0
          while read -r challenge_id; do
            [ -n "$challenge_id" ] || continue
            hdr=$(mktemp)
            code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/solutions/${solution_id}/edit")
            location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
            rm -f "$hdr"
            if [ "$code" = "307" ] && echo "$location" | grep -qi "/login"; then
              echo "/ko/challenges/${challenge_id}/solutions/${solution_id}/edit → $code $location"
              echo "$location" | grep -qi "callbackUrl"
              edit_found=1
              break
            fi
          done < <(
            echo "$home_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | sed 's|challenges/||' \
              | awk '!seen[$0]++'
          )
          test "$edit_found" = "1"

      - name: Check invalid user 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/users/not-a-valid-user)
          echo "/ko/users/invalid → $code"
          test "$code" = "404"

      - name: Check invalid challenge 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid)
          echo "/ko/challenges/invalid → $code"
          test "$code" = "404"

      - name: Check invalid challenge edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/edit)
          echo "/ko/challenges/invalid/edit → $code"
          test "$code" = "404"

      - name: Check invalid solution new 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/solutions/new)
          echo "/ko/challenges/invalid/solutions/new → $code"
          test "$code" = "404"

      - name: Check invalid solution edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/solutions/invalid/edit)
          echo "/ko/challenges/invalid/solutions/invalid/edit → $code"
          test "$code" = "404"

      - name: Check sitemap includes users
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/sitemap.xml)
          echo "/sitemap.xml → $code"
          test "$code" = "200"
          curl -sL https://canaithis.vercel.app/sitemap.xml | grep -q "/users/"