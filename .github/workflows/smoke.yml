name: Production smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check homepage
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko)
          echo "/ko → $code"
          test "$code" = "200"

      - name: Check homepage RSS alternate link
        run: |
          home_html=$(curl -sL https://canaithis.vercel.app/ko)
          rss_link=$(echo "$home_html" | grep -oE '<link[^>]*application/rss\+xml[^>]*>' || true)
          test -n "$rss_link"
          echo "$rss_link" | grep -q 'rel="alternate"'
          echo "$rss_link" | grep -qE 'href="[^"]*/feed\.xml"'
          echo "/ko head → RSS alternate link OK"

      - name: Check English homepage RSS alternate link
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en)
          echo "/en → $code"
          test "$code" = "200"
          en_html=$(curl -sL https://canaithis.vercel.app/en)
          rss_link=$(echo "$en_html" | grep -oE '<link[^>]*application/rss\+xml[^>]*>' || true)
          test -n "$rss_link"
          echo "$rss_link" | grep -q 'rel="alternate"'
          echo "$rss_link" | grep -qE 'href="[^"]*/feed\.xml"'
          echo "/en head → RSS alternate link OK"

      - name: Check homepage challenge cards (DB)
        run: |
          home_html=$(curl -sL https://canaithis.vercel.app/ko)
          challenge_id=$(
            echo "$home_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "/ko challenge card → challenges/${challenge_id}"
          code=$(curl -sL -o /dev/null -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}")
          echo "/ko/challenges/${challenge_id} → $code"
          test "$code" = "200"

      - name: Check English homepage challenge cards (DB)
        run: |
          en_html=$(curl -sL https://canaithis.vercel.app/en)
          challenge_id=$(
            echo "$en_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "/en challenge card → challenges/${challenge_id}"
          code=$(curl -sL -o /dev/null -w "%{http_code}" "https://canaithis.vercel.app/en/challenges/${challenge_id}")
          echo "/en/challenges/${challenge_id} → $code"
          test "$code" = "200"

      - name: Check login page
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/login)
          echo "/ko/login → $code"
          test "$code" = "200"

      - name: Check English login page
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/login)
          echo "/en/login → $code"
          test "$code" = "200"

      - name: Check profile redirects to login
        run: |
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/profile")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/profile → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check English profile redirects to login
        run: |
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/en/profile")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/en/profile → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check challenges new redirects to login
        run: |
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/new")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/challenges/new → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check English challenges new redirects to login
        run: |
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/en/challenges/new")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/en/challenges/new → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check RSS feed
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/feed.xml)
          echo "/feed.xml → $code"
          test "$code" = "200"
          feed_body=$(curl -sL https://canaithis.vercel.app/feed.xml)
          echo "$feed_body" | head -1 | grep -q "<?xml"
          channel_block=$(echo "$feed_body" | sed -n '/<channel>/,/<item>/p' | head -10)
          echo "$channel_block" | grep -qE '<title>CanAIThis</title>'
          echo "feed.xml channel → title OK"
          echo "$channel_block" | grep -qE '<link>https?://[^<]+</link>'
          echo "feed.xml channel → link OK"
          echo "$channel_block" | grep -qE '<description>AI challenges and solutions community</description>'
          echo "feed.xml channel → description OK"
          echo "$channel_block" | grep -qE '<language>ko</language>'
          echo "feed.xml channel → language OK"
          item_count=$(echo "$feed_body" | grep -c '<item>' || true)
          test "$item_count" -ge 1
          echo "feed.xml → ${item_count} RSS item(s) OK"
          first_item=$(echo "$feed_body" | sed -n '/<item>/,/<\/item>/p' | head -20)
          echo "$first_item" | grep -qE '<title>[^<]{2,}</title>'
          echo "feed.xml item → title OK"
          echo "$first_item" | grep -qE '<link>https?://[^<]+/challenges/[a-f0-9]{24}</link>'
          echo "feed.xml item → link OK"
          echo "$first_item" | grep -qE '<guid[^>]*>https?://[^<]+/challenges/[a-f0-9]{24}</guid>'
          echo "feed.xml item → guid OK"
          echo "$first_item" | grep -qE '<pubDate>[A-Za-z]{3}, [0-9]{2} [A-Za-z]{3} [0-9]{4} [0-9]{2}:[0-9]{2}:[0-9]{2} GMT</pubDate>'
          echo "feed.xml item → pubDate OK"
          echo "$first_item" | grep -qE '<description>[^<]{2,}</description>'
          echo "feed.xml item → description OK"

      - name: Check challenge edit redirects to login
        run: |
          challenge_id=$(
            curl -sL https://canaithis.vercel.app/feed.xml \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from feed.xml → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/edit")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/challenges/${challenge_id}/edit → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check English challenge edit redirects to login
        run: |
          en_html=$(curl -sL https://canaithis.vercel.app/en)
          challenge_id=$(
            echo "$en_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from /en → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/en/challenges/${challenge_id}/edit")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/en/challenges/${challenge_id}/edit → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check solution new redirects to login
        run: |
          challenge_id=$(
            curl -sL https://canaithis.vercel.app/feed.xml \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from feed.xml → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/solutions/new")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/ko/challenges/${challenge_id}/solutions/new → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check English solution new redirects to login
        run: |
          challenge_id=$(
            curl -sL https://canaithis.vercel.app/feed.xml \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | head -1 \
              | sed 's|challenges/||'
          )
          test -n "$challenge_id"
          echo "challenge id from feed.xml → $challenge_id"
          hdr=$(mktemp)
          code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/en/challenges/${challenge_id}/solutions/new")
          location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
          rm -f "$hdr"
          echo "/en/challenges/${challenge_id}/solutions/new → $code $location"
          test "$code" = "307"
          echo "$location" | grep -qi "/login"
          echo "$location" | grep -qi "callbackUrl"

      - name: Check solution edit redirects to login
        run: |
          home_html=$(curl -sL https://canaithis.vercel.app/ko)
          solution_id=$(
            echo "$home_html" \
              | grep -oE 'ACTION_ID_[a-f0-9]{24}' \
              | head -1 \
              | sed 's|ACTION_ID_||'
          )
          test -n "$solution_id"
          echo "solution id from /ko → $solution_id"
          edit_found=0
          while read -r challenge_id; do
            [ -n "$challenge_id" ] || continue
            hdr=$(mktemp)
            code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/ko/challenges/${challenge_id}/solutions/${solution_id}/edit")
            location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
            rm -f "$hdr"
            if [ "$code" = "307" ] && echo "$location" | grep -qi "/login"; then
              echo "/ko/challenges/${challenge_id}/solutions/${solution_id}/edit → $code $location"
              echo "$location" | grep -qi "callbackUrl"
              edit_found=1
              break
            fi
          done < <(
            echo "$home_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | sed 's|challenges/||' \
              | awk '!seen[$0]++'
          )
          test "$edit_found" = "1"

      - name: Check English solution edit redirects to login
        run: |
          en_html=$(curl -sL https://canaithis.vercel.app/en)
          solution_id=$(
            echo "$en_html" \
              | grep -oE 'ACTION_ID_[a-f0-9]{24}' \
              | head -1 \
              | sed 's|ACTION_ID_||'
          )
          test -n "$solution_id"
          echo "solution id from /en → $solution_id"
          edit_found=0
          while read -r challenge_id; do
            [ -n "$challenge_id" ] || continue
            hdr=$(mktemp)
            code=$(curl -s -o /dev/null -D "$hdr" -w "%{http_code}" "https://canaithis.vercel.app/en/challenges/${challenge_id}/solutions/${solution_id}/edit")
            location=$(grep -i "^location:" "$hdr" | tr -d '\r' || true)
            rm -f "$hdr"
            if [ "$code" = "307" ] && echo "$location" | grep -qi "/login"; then
              echo "/en/challenges/${challenge_id}/solutions/${solution_id}/edit → $code $location"
              echo "$location" | grep -qi "callbackUrl"
              edit_found=1
              break
            fi
          done < <(
            echo "$en_html" \
              | grep -oE 'challenges/[a-f0-9]{24}' \
              | grep -v '/new' \
              | sed 's|challenges/||' \
              | awk '!seen[$0]++'
          )
          test "$edit_found" = "1"

      - name: Check invalid user 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/users/not-a-valid-user)
          echo "/ko/users/invalid → $code"
          test "$code" = "404"

      - name: Check English invalid user 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/users/not-a-valid-user)
          echo "/en/users/invalid → $code"
          test "$code" = "404"

      - name: Check invalid locale 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx)
          echo "/xx (invalid locale) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested challenges 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges)
          echo "/xx/challenges (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested login 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/login)
          echo "/xx/login (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested profile 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/profile)
          echo "/xx/profile (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested challenges new 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges/new)
          echo "/xx/challenges/new (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested challenge detail 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges/invalid)
          echo "/xx/challenges/invalid (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested challenge edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges/invalid/edit)
          echo "/xx/challenges/invalid/edit (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested solution new 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges/invalid/solutions/new)
          echo "/xx/challenges/invalid/solutions/new (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested solution edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/challenges/invalid/solutions/invalid/edit)
          echo "/xx/challenges/invalid/solutions/invalid/edit (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested user 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/users/not-a-valid-user)
          echo "/xx/users/not-a-valid-user (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested feed.xml 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/feed.xml)
          echo "/xx/feed.xml (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid locale nested sitemap.xml 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/xx/sitemap.xml)
          echo "/xx/sitemap.xml (invalid locale nested) → $code"
          test "$code" = "404"

      - name: Check invalid challenge 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid)
          echo "/ko/challenges/invalid → $code"
          test "$code" = "404"

      - name: Check English invalid challenge 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/challenges/invalid)
          echo "/en/challenges/invalid → $code"
          test "$code" = "404"

      - name: Check invalid challenge edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/edit)
          echo "/ko/challenges/invalid/edit → $code"
          test "$code" = "404"

      - name: Check English invalid challenge edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/challenges/invalid/edit)
          echo "/en/challenges/invalid/edit → $code"
          test "$code" = "404"

      - name: Check invalid solution new 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/solutions/new)
          echo "/ko/challenges/invalid/solutions/new → $code"
          test "$code" = "404"

      - name: Check English invalid solution new 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/challenges/invalid/solutions/new)
          echo "/en/challenges/invalid/solutions/new → $code"
          test "$code" = "404"

      - name: Check invalid solution edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/ko/challenges/invalid/solutions/invalid/edit)
          echo "/ko/challenges/invalid/solutions/invalid/edit → $code"
          test "$code" = "404"

      - name: Check English invalid solution edit 404
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/en/challenges/invalid/solutions/invalid/edit)
          echo "/en/challenges/invalid/solutions/invalid/edit → $code"
          test "$code" = "404"

      - name: Check robots.txt and Sitemap directive
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/robots.txt)
          echo "/robots.txt → $code"
          test "$code" = "200"
          robots_body=$(curl -sL https://canaithis.vercel.app/robots.txt)
          echo "$robots_body" | grep -qi "Sitemap:"
          echo "robots.txt → Sitemap directive OK"
          echo "$robots_body" | grep -qE 'Sitemap:\s*https?://[^[:space:]]+/sitemap\.xml'
          echo "robots.txt → sitemap.xml URL OK"

      - name: Check sitemap includes users and challenges
        run: |
          code=$(curl -sL -o /dev/null -w "%{http_code}" https://canaithis.vercel.app/sitemap.xml)
          echo "/sitemap.xml → $code"
          test "$code" = "200"
          sitemap_body=$(curl -sL https://canaithis.vercel.app/sitemap.xml)
          echo "$sitemap_body" | grep -q "/users/"
          echo "sitemap → /users/ OK"
          echo "$sitemap_body" | grep -qE '/challenges/[a-f0-9]{24}'
          echo "sitemap → /challenges/ detail OK"